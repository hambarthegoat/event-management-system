opencollection: 1.0.0

info:
  name: event-management-system
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: x-actor-id
      value: organizer-1
    - name: x-actor-role
      value: EventOrganizer
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
